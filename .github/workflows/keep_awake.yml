name: Keep ThreatScope App Awake

on:
  schedule:
    # Run every 30 minutes to prevent the Streamlit Cloud app from going to sleep
    - cron: '*/30 * * * *'
  workflow_dispatch: # Enables manually triggering the workflow from the Actions tab

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run keep-awake script
        run: python keep_awake.py

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: app-screenshot
          path: screenshot.png
